services:
  scrap-knowledge2:
    build: ./scrap_knowledge2
    container_name: scrap_knowledge2_service
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - ./scrap_knowledge2/.env

  frontend:
    build: ./frontend
    container_name: frontend_service
    ports:
      - "3000:3000"
    expose:
      - "3000"
    env_file:
      - ./frontend/.env